<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vault — File Storage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <div class="topbar__brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="3" width="18" height="18" rx="4" fill="currentColor"/>
        <path d="M8 12.5L10.5 15L16 9" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Vault</span>
    </div>
    <div class="topbar__meta">
      <span id="fileCount">—</span>
      <span class="dot">·</span>
      <span id="totalSize">—</span>
    </div>
  </header>

  <main class="page">

    <section id="dropzone" class="dropzone">
      <input type="file" id="fileInput" hidden multiple />
      <div class="dropzone__icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 16V4M12 4L7 9M12 4L17 9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M4 16V18C4 19.1046 4.89543 20 6 20H18C19.1046 20 20 19.1046 20 18V16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <p class="dropzone__title">Drop files to upload</p>
      <p class="dropzone__sub">or <button id="browseBtn" class="link-btn">browse from your device</button></p>
    </section>

    <div id="uploadQueue" class="upload-queue"></div>

    <section class="panel">
      <div class="panel__head">
        <h2>Files</h2>
        <button id="refreshBtn" class="icon-btn" title="Refresh">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 11A8.1 8.1 0 0 0 4.5 9M4 5v4h4M4 13a8.1 8.1 0 0 0 15.5 2M20 19v-4h-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <div id="tableWrap">
        <table class="file-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Size</th>
              <th>Uploaded</th>
              <th aria-label="Actions"></th>
            </tr>
          </thead>
          <tbody id="fileList"></tbody>
        </table>

        <div id="emptyState" class="empty-state" hidden>
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="7" width="18" height="13" rx="2" stroke="currentColor" stroke-width="1.6"/>
            <path d="M3 7L7 3H17L21 7" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
          </svg>
          <p>Vault is empty</p>
          <span>Files you upload will show up here.</span>
        </div>

        <div id="loadingState" class="loading-state">
          <div class="spinner"></div>
        </div>
      </div>
    </section>

  </main>

  <div id="toastContainer" class="toast-container" aria-live="polite"></div>

  <div id="confirmModal" class="modal">
    <div class="modal__card">
      <h3>Delete file?</h3>
      <p id="confirmModalText">This action can't be undone.</p>
      <div class="modal__actions">
        <button id="confirmCancel" class="btn btn--ghost">Cancel</button>
        <button id="confirmOk" class="btn btn--danger">Delete</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
